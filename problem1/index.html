<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeJS AJAX Example</title>
</head>
<body>
    <h2>NodeJS AJAX Example</h2>

    <button onclick="getData()">Get Hello</button>

    <p id="result"></p>

    <script>
        function getData() {
            fetch("/gethello")
            .then(response => response.text())
            .then(data => {
                document.getElementById("result").innerHTML = data
            })
            .catch(err,()=>{
                console.log(err)
            }) 
        }
    </script>
</body>
</html>
